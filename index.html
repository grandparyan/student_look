<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>報修紀錄追蹤與處理 (教師/管理員)</title>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary-blue': '#4F46E5',
                        'primary-dark': '#3730A3',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        /* 隱藏原生捲軸，但保留滾動功能 */
        .custom-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .custom-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>
<body>
    <div class="min-h-screen p-4 md:p-8">
        <!-- 標題區域 -->
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">報修紀錄追蹤與處理 (教師/管理員)</h1>
            <p class="text-gray-600 mb-4">即時查看並更新報修狀態與指派負責人。</p>
            <a href="#" class="text-primary-blue hover:text-primary-dark transition duration-150 ease-in-out text-sm" onclick="alert('點擊此處將導向學生報修頁面或表單。'); return false;">點擊前往學生報修介面</a>
        </header>

        <!-- 表格容器 -->
        <div id="loading" class="text-center text-primary-blue text-lg font-semibold my-12">
            載入中，請稍候...
        </div>

        <div id="table-container" class="bg-white shadow-xl rounded-xl overflow-hidden hidden">
            <div class="overflow-x-auto custom-scrollbar">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-primary-blue text-white">
                        <tr>
                            <th scope="col" class="px-3 py-3 text-left text-xs font-medium uppercase tracking-wider">時間</th>
                            <th scope="col" class="px-3 py-3 text-left text-xs font-medium uppercase tracking-wider">報修人</th>
                            <th scope="col" class="px-3 py-3 text-left text-xs font-medium uppercase tracking-wider">聯絡電話</th> <!-- 新增欄位 -->
                            <th scope="col" class="px-3 py-3 text-left text-xs font-medium uppercase tracking-wider">位置</th>
                            <th scope="col" class="px-3 py-3 text-left text-xs font-medium uppercase tracking-wider">設備名稱/類型</th> <!-- 新增欄位 -->
                            <th scope="col" class="px-3 py-3 text-left text-xs font-medium uppercase tracking-wider">問題描述</th>
                            <th scope="col" class="px-3 py-3 text-left text-xs font-medium uppercase tracking-wider">狀態</th>
                            <th scope="col" class="px-3 py-3 text-left text-xs font-medium uppercase tracking-wider">負責人</th>
                            <th scope="col" class="px-3 py-3 text-left text-xs font-medium uppercase tracking-wider">操作</th>
                        </tr>
                    </thead>
                    <tbody id="reports-table-body" class="bg-white divide-y divide-gray-200">
                        <!-- 資料將由 JavaScript 填充 -->
                    </tbody>
                </table>
            </div>
            <!-- 錯誤訊息顯示區塊 -->
            <div id="error-message" class="p-4 text-center text-red-600 hidden"></div>
            <!-- 無資料顯示區塊 -->
            <div id="no-data-message" class="p-4 text-center text-gray-500 hidden">目前沒有報修紀錄。</div>
        </div>
    </div>

    <!-- 模態框用於顯示錯誤或提示 -->
    <div id="modal" class="fixed inset-0 bg-gray-600 bg-opacity-75 hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-lg p-6 shadow-2xl max-w-sm w-full">
            <h3 id="modal-title" class="text-xl font-bold mb-4 text-gray-800">提示</h3>
            <p id="modal-body" class="mb-6 text-gray-600"></p>
            <button onclick="closeModal()" class="w-full bg-primary-blue hover:bg-primary-dark text-white font-bold py-2 px-4 rounded-lg transition duration-150 ease-in-out">
                確認
            </button>
        </div>
    </div>

    <script type="module">
        // ====================================================================
        // Firebase Setup & Global Variables (MANDATORY)
        // ====================================================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, query, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { setLogLevel } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firestore Setup and User ID acquisition (Mandatory)
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const __initial_auth_token = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        // 啟用 Firebase 偵錯日誌
        setLogLevel('debug');

        let currentUserId = null;
        let isAuthReady = false;

        // 報修狀態選項
        const STATUS_OPTIONS = [
            { value: '待處理', label: '待處理' },
            { value: '處理中', label: '處理中' },
            { value: '已修復', label: '已修復' },
            { value: '無法修復', label: '無法修復' },
        ];

        // API 設置 (使用 /artifacts/{appId}/public/data/reports 作為集合)
        const REPORTS_COLLECTION_PATH = `artifacts/${appId}/public/data/reports`;
        
        // ====================================================================
        // UI Helpers
        // ====================================================================

        function showModal(title, message) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-body').textContent = message;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal').classList.remove('flex');
        }

        function showLoading() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('table-container').classList.add('hidden');
        }

        function hideLoading() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('table-container').classList.remove('hidden');
        }

        function showErrorMessage(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = '錯誤: ' + message;
            errorDiv.classList.remove('hidden');
            document.getElementById('no-data-message').classList.add('hidden');
        }

        function showNoDataMessage() {
            document.getElementById('no-data-message').classList.remove('hidden');
            document.getElementById('error-message').classList.add('hidden');
        }

        function hideMessages() {
            document.getElementById('no-data-message').classList.add('hidden');
            document.getElementById('error-message').classList.add('hidden');
        }

        // ====================================================================
        // Data Handling (Render, Update)
        // ====================================================================

        /**
         * 根據報修紀錄資料渲染表格。
         * @param {Array<Object>} reports - 報修紀錄陣列
         */
        function renderTable(reports) {
            const tableBody = document.getElementById('reports-table-body');
            tableBody.innerHTML = ''; // 清空舊資料
            hideMessages();

            if (reports.length === 0) {
                showNoDataMessage();
                return;
            }

            reports.forEach(report => {
                const row = tableBody.insertRow();
                row.className = 'hover:bg-gray-50 transition duration-150 ease-in-out';
                row.dataset.docId = report.id; // 儲存 Firestore 文件 ID

                // 1. 報修時間 (A欄)
                row.insertCell().textContent = report['報修時間'] || '';
                
                // 2. 報修人 (B欄)
                row.insertCell().textContent = report['報修人姓名'] || '';

                // 3. 聯絡電話 (新增的常用欄位)
                row.insertCell().textContent = report['聯絡電話'] || '';

                // 4. 位置 (C欄)
                row.insertCell().textContent = report['設備位置 / 教室名稱'] || '';

                // 5. 設備名稱/類型 (新增的常用欄位)
                // 注意：這裡使用 '設備名稱/類型' 作為範例鍵名，請確保它與您的試算表欄位名稱一致
                row.insertCell().textContent = report['設備名稱/類型'] || '';
                
                // 6. 問題描述 (D欄)
                row.insertCell().textContent = report['問題詳細描述'] || '';
                
                // 7. 狀態 (E欄) - 可編輯下拉選單
                const statusCell = row.insertCell();
                const statusSelect = document.createElement('select');
                statusSelect.className = 'w-full px-2 py-1 border border-gray-300 rounded-lg focus:ring-primary-blue focus:border-primary-blue bg-white text-sm';
                
                STATUS_OPTIONS.forEach(option => {
                    const opt = document.createElement('option');
                    opt.value = option.value;
                    opt.textContent = option.label;
                    if (option.value === (report['狀態'] || '待處理')) {
                        opt.selected = true;
                    }
                    statusSelect.appendChild(opt);
                });
                statusCell.appendChild(statusSelect);


                // 8. 負責人 (F欄 - 編輯欄位)
                const teacherCell = row.insertCell();
                const teacherInput = document.createElement('input');
                teacherInput.type = 'text';
                teacherInput.className = 'w-full px-2 py-1 border border-gray-300 rounded-lg focus:ring-primary-blue focus:border-primary-blue';
                teacherInput.value = report['負責人'] || ''; // 讀取已指派的負責人
                teacherInput.placeholder = '輸入負責人姓名';
                teacherCell.appendChild(teacherInput);

                // 9. 操作 (更新按鈕)
                const actionCell = row.insertCell();
                const updateButton = document.createElement('button');
                updateButton.textContent = '更新';
                updateButton.className = 'bg-green-500 hover:bg-green-600 text-white font-semibold py-1 px-3 rounded-lg text-xs transition duration-150 ease-in-out shadow-md';
                
                // 重新定義更新按鈕的行為，同時傳送 狀態 和 負責人
                updateButton.onclick = () => handleUpdate(
                    report.id, 
                    statusSelect.value, // 新狀態
                    teacherInput.value  // 新負責人
                );
                
                actionCell.appendChild(updateButton);
            });
        }

        /**
         * 取得狀態的 Tailwind CSS 類別名稱。
         * @param {string} status - 報修狀態
         * @returns {string} CSS 類別名稱
         */
        function getStatusClass(status) {
            // 這個函式目前沒有被 renderTable 使用，因為狀態已改為下拉選單，
            // 但保留用於未來可能需要顯示顏色標籤的欄位。
            switch (status) {
                case '處理中':
                    return 'text-orange-600 font-semibold';
                case '已修復':
                    return 'text-green-600 font-semibold';
                case '無法修復':
                    return 'text-red-600 font-semibold';
                case '待處理':
                default:
                    return 'text-blue-600 font-semibold';
            }
        }

        /**
         * 處理更新狀態和負責人的邏輯
         * @param {string} docId - Firestore 文件 ID
         * @param {string} newStatus - 新的狀態值
         * @param {string} newTeacher - 新的負責人姓名
         */
        async function handleUpdate(docId, newStatus, newTeacher) {
            if (!currentUserId) {
                showModal('錯誤', '使用者驗證失敗，請稍後重試。');
                return;
            }

            try {
                // 確保 docId, newStatus, newTeacher 都是有效的
                if (!docId) {
                    throw new Error('缺少文件 ID');
                }

                // 構建更新資料物件
                const updateData = {
                    '狀態': newStatus || '待處理',
                    '負責人': newTeacher || '', // 負責人可以為空字串
                };

                // 更新 Firestore 文件
                const docRef = doc(db, REPORTS_COLLECTION_PATH, docId);
                await updateDoc(docRef, updateData);

                showModal('成功', `報修紀錄 #${docId.substring(0, 5)}... 已成功更新狀態為: ${newStatus}，負責人為: ${newTeacher || '未指派'}`);
                
                // 更新成功後，onSnapshot 會自動觸發重新渲染
            } catch (error) {
                console.error("更新紀錄失敗:", error);
                showModal('更新失敗', `更新報修紀錄時發生錯誤: ${error.message}`);
            }
        }

        // ====================================================================
        // Initialization & Authentication
        // ====================================================================

        /**
         * 設置 Firestore 監聽器以實時獲取報修紀錄
         */
        function setupFirestoreListener() {
            if (!isAuthReady) return; // 確保在驗證完成後才開始監聽

            // 建立查詢，獲取整個公開集合的所有文件
            const q = query(collection(db, REPORTS_COLLECTION_PATH));
            
            // 實時監聽資料變更
            onSnapshot(q, (querySnapshot) => {
                const reports = [];
                querySnapshot.forEach((doc) => {
                    // 將文件 ID 也儲存在資料物件中，用於更新操作
                    reports.push({ id: doc.id, ...doc.data() });
                });
                
                // 依據報修時間降冪排序 (最新的在最上面)
                reports.sort((a, b) => new Date(b['報修時間']) - new Date(a['報修時間']));
                
                hideLoading();
                renderTable(reports);
            }, (error) => {
                console.error("Firestore 實時監聽失敗:", error);
                hideLoading();
                showErrorMessage(`無法載入資料。錯誤: ${error.message}`);
            });
        }

        /**
         * 初始化 Firebase 驗證
         */
        async function initAuth() {
            showLoading();
            
            // 優先使用自訂 Token 登入，否則使用匿名登入
            if (__initial_auth_token) {
                try {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } catch (error) {
                    console.error("Custom token sign in failed. Falling back to anonymous.", error);
                    await signInAnonymously(auth);
                }
            } else {
                await signInAnonymously(auth);
            }

            // 設置身份驗證狀態監聽
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    currentUserId = user.uid;
                } else {
                    // 如果用戶登出，使用隨機 ID 作為匿名用戶標識，但由於此處強制登入，此情況較少見
                    currentUserId = crypto.randomUUID();
                }
                isAuthReady = true;
                setupFirestoreListener(); // 驗證完成後開始監聽資料
            });
        }

        // 啟動應用程式
        initAuth();

    </script>
</body>
</html>
